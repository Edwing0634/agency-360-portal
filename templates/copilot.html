{% extends "base.html" %}
{% block title %}AI Copilot — 360 Portal{% endblock %}

{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-robot me-2 text-primary"></i>Agency AI Copilot</h4>

<div class="card border-0 shadow-sm" style="max-width:700px">
  <div class="card-header bg-primary text-white">
    <small><i class="bi bi-circle-fill text-success me-2" style="font-size:.6rem"></i>Online</small>
  </div>
  <div class="card-body p-0">
    <div id="chat-window" class="p-3" style="height:400px;overflow-y:auto;background:#f8f9fa">
      <div class="d-flex gap-2 mb-3">
        <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center"
             style="width:32px;height:32px;flex-shrink:0"><i class="bi bi-robot"></i></div>
        <div class="bg-white rounded-3 shadow-sm p-3 small">
          Hello <strong>{{ session.full_name }}</strong>! I'm your Agency Copilot.
          Ask me about KPIs, rankings, collections, or agent performance.
        </div>
      </div>
    </div>
  </div>
  <div class="card-footer bg-white">
    <form id="chat-form" class="d-flex gap-2">
      <input type="text" id="chat-input" class="form-control" placeholder="Ask something…" autocomplete="off" />
      <button type="submit" class="btn btn-primary px-4">
        <i class="bi bi-send"></i>
      </button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const chatWindow = document.getElementById('chat-window');
const chatForm   = document.getElementById('chat-form');
const chatInput  = document.getElementById('chat-input');

function appendMessage(text, isUser = false) {
  const wrapper = document.createElement('div');
  wrapper.className = 'd-flex gap-2 mb-3' + (isUser ? ' flex-row-reverse' : '');
  const avatar = document.createElement('div');
  avatar.className = 'rounded-circle d-flex align-items-center justify-content-center text-white';
  avatar.style = 'width:32px;height:32px;flex-shrink:0;background:' + (isUser ? '#198754' : '#0d6efd');
  avatar.innerHTML = isUser ? '<i class="bi bi-person"></i>' : '<i class="bi bi-robot"></i>';
  const bubble = document.createElement('div');
  bubble.className = 'rounded-3 shadow-sm p-3 small ' + (isUser ? 'bg-success text-white' : 'bg-white');
  bubble.textContent = text;
  wrapper.appendChild(avatar);
  wrapper.appendChild(bubble);
  chatWindow.appendChild(wrapper);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

chatForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = chatInput.value.trim();
  if (!msg) return;
  appendMessage(msg, true);
  chatInput.value = '';
  try {
    const res = await fetch('/api/copilot/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
    const data = await res.json();
    appendMessage(data.reply || data.error);
  } catch {
    appendMessage('Connection error. Please try again.');
  }
});
</script>
{% endblock %}
